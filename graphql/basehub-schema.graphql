"""
Union of all block document types in the repository.
The set of members is dynamic per repository.
"""
union BlockDocument = Authors | AuthorsItem | Blog | Language | Posts | PostsItem | Settings | _AgentStart | authorsItem_AsList | postsItem_AsList

"""
Union of all list block types in the repository.
"""
union BlockList = Authors | Posts | authorsItem_AsList | postsItem_AsList

# ─── Mutation Types ───────────────────────────────────────────────────────────

"""Result of a getUploadSignedURL mutation."""
type GetUploadSignedURL {
  """Pre-signed URL for uploading the file (PUT request)."""
  signedURL: String!
  """Final URL the file will be accessible at after upload."""
  uploadURL: String!
}

"""Status and result of a mutation transaction."""
type TransactionStatus {
  """Duration of the transaction in milliseconds."""
  duration: Int
  """ISO 8601 timestamp when the transaction ended."""
  endedAt: String
  id: String!
  """Error or info message if applicable."""
  message: String
  """ISO 8601 timestamp when the transaction started."""
  startedAt: String!
  """Current status of the transaction."""
  status: TransactionStatusEnum!
}

"""Input for targeting a specific block in structure queries."""
input TargetBlock {
  focus: Boolean
  id: String!
  label: String!
}

# ─── Root Operation Types ─────────────────────────────────────────────────────

"""
Root query type. Fields beyond the system fields (_sys, _agents,
_componentInstances, _diff, _structure) are generated dynamically from each
repository's content model. The content fields shown here (blog, settings)
are from the canonical basehub-ai/basehub blog-template repository.
"""
type Query {
  """Fetch a specific AI agent by ID."""
  _agent(
    """The ID of the agent."""
    id: String!
  ): _AgentStart

  """Query all custom AI agents defined in the repository."""
  _agents: _agents!

  """
  Query all component instances across the repository.
  Supports filtering, ordering, and pagination per component type.
  """
  _componentInstances: _components!

  """
  JSON diff between the current branch and its head commit.
  Useful for detecting content changes.
  """
  _diff(
    """Return a simplified diff showing only item statuses."""
    simplified: Boolean
  ): JSON!

  """
  Repository content structure in JSON or XML format.
  Used by BaseHub START and internal tooling.
  """
  _structure(
    format: _StructureFormatEnum
    resolveTargetsWith: _ResolveTargetsWithEnum
    targetBlock: TargetBlock
    withConstraints: Boolean
    withIDs: Boolean
    withTypeOptions: Boolean
  ): JSON!

  """Repository-level system metadata."""
  _sys: RepoSys!

  """Blog document block (example content model field)."""
  blog(variants: Language__VariantsInput): Blog!

  """Site settings document block (example content model field)."""
  settings: Settings!
}

"""
Root mutation type. All mutations require authentication via x-basehub-token.
"""
type Mutation {
  """
  Generate a signed upload URL for adding a file to the repository.
  After uploading the file via PUT to signedURL, the file is accessible
  at uploadURL.
  """
  getUploadSignedURL(
    """SHA256 hash of the file, used to deduplicate existing files."""
    fileHash: String
    """The file name (required)."""
    fileName: String!
  ): GetUploadSignedURL!

  """
  Execute a synchronous mutation transaction. Blocks until the transaction
  completes or times out. Internally runs transactionAsync and polls for
  the result.
  """
  transaction(
    """ID of the transaction author. Defaults to the API token identity."""
    authorId: String
    """Auto-commit the changes with this message."""
    autoCommit: String
    """Transaction payload (JSON string or Transaction object)."""
    data: String!
    """Skip workflow and event subscriber execution. Defaults to false."""
    skipWorkflows: Boolean
    """Timeout in milliseconds. Defaults to 30000."""
    timeout: Int
  ): TransactionStatus!

  """
  Start an asynchronous mutation transaction. Returns a transaction ID
  that can be polled via transactionStatus.
  """
  transactionAsync(
    authorId: String
    autoCommit: String
    """Transaction payload as a JSON string."""
    data: String!
    skipWorkflows: Boolean
  ): String!

  """Poll the status of a previously started transaction."""
  transactionStatus(
    """Transaction ID returned by transactionAsync."""
    id: String!
  ): TransactionStatus!
}

schema {
  query: Query
  mutation: Mutation
}
