"""Search configuration for AuthorsItem full-text search."""
input AuthorsItemSearchInput {
  """Fields to search within."""
  by: [String!]
  """Search query string."""
  q: String
}

"""Authors collection (list block)."""
type Authors {
  _analyticsKey(scope: AnalyticsKeyScope): String!
  _dashboardUrl: String!
  _id: String!
  _idPath: String!
  _meta: ListMeta!
  """Key for frontend search integration."""
  _searchKey: String!
  _slug: String!
  _slugPath: String!
  _sys: BlockDocumentSys!
  _title: String!
  """Returns the first matching item, or null if none exist."""
  item: AuthorsItem
  """Returns items after applying filters, ordering, and pagination."""
  items(
    filter: AuthorsItemFilterInput
    first: Int
    orderBy: AuthorsItemOrderByEnum
    search: AuthorsItemSearchInput
    skip: Int
  ): [AuthorsItem!]!
}

"""All instances of AuthorsItem as a queryable list (via _componentInstances)."""
type authorsItem_AsList {
  _analyticsKey(scope: AnalyticsKeyScope): String!
  _dashboardUrl: String!
  _id: String!
  _idPath: String!
  _meta: ListMeta!
  _searchKey: String!
  _slug: String!
  _slugPath: String!
  _sys: BlockDocumentSys!
  _title: String!
  item: AuthorsItem
  items(
    filter: AuthorsItemFilterInput
    first: Int
    orderBy: AuthorsItemOrderByEnum
    search: AuthorsItemSearchInput
    skip: Int
  ): [AuthorsItem!]!
}

